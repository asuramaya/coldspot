name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          echo "tag=${tag} VERSION=${file}"
          if [ "${tag}" != "${file}" ]; then
            echo "::error::tag ${tag} does not match VERSION ${file}"
            exit 1
          fi

      - name: Build release tarball
        run: |
          # .gitattributes export-ignore keeps CI/dev files out of the tarball.
          git archive --format=tar.gz --prefix=coldspot/ -o coldspot.tar.gz HEAD
          sha256sum coldspot.tar.gz > coldspot.tar.gz.sha256
          echo "--- contents ---"
          tar -tzf coldspot.tar.gz

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              coldspot.tar.gz coldspot.tar.gz.sha256 --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              coldspot.tar.gz coldspot.tar.gz.sha256 \
              --title "coldspot ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
